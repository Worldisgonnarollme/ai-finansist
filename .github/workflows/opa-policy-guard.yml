name: OPA policy no-calculation guard

on:
  push:
    paths:
      - "opa/**"
  pull_request:
    paths:
      - "opa/**"

jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Forbid tax amount/rate calculation in eligibility/qualification policies
        run: ./opa/check_policy_no_calculation.sh
